<div class="setup-title">
  <h1><span>فكّها</span> إن قدرت</h1>
  <p>استخدم المنطق والاستنتاج للوصول إليه</p>
</div>

<div class="setup-section">
  <div class="section-label">عدد الخانات</div>
  <div class="toggle-group">
    <button
      class="toggle-btn"
      [class.on]="len() === 2"
      [class.gold]="len() === 2"
      (click)="setLen(2)"
    >خانتان</button>
    <button
      class="toggle-btn"
      [class.on]="len() === 3"
      [class.gold]="len() === 3"
      (click)="setLen(3)"
    >ثلاث خانات</button>
  </div>
</div>

<div class="setup-section">
  <div class="section-label">التلميحات</div>
  <div class="rules-card">
    <div class="hint-legend">
      <span class="hint-chip correct">✅ مكانه صحيح</span>
      <span class="hint-chip wrong-pos">🟡 موجود لكن مكانه خاطئ</span>
      <span class="hint-chip absent">❌ غير موجود</span>
    </div>
    أرقام ٠–٩ · لا يتكرر رقم في أكثر من خانة · التلميح يعكس ترتيب الإدخال
  </div>
</div>

<button class="start-btn" (click)="startGame()">ابدأ اللعبة</button>
